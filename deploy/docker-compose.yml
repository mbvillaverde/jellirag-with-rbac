# Local LXC deployment: Astro frontend (:3000) + FastAPI backend (:8000)
# Exposed via tailscale serve with auto-issued Let's Encrypt certs.
# No public ingress, no Traefik, no Cloudflare dependencies.
#
# All state lives in a single SQLite database mounted as a volume.
# AI providers are OpenAI-compatible HTTP endpoints (default: Ollama on MacBook over Tailscale).

services:
  frontend:
    build:
      context: ../apps/frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      # Relative endpoint; frontend calls backend at same origin
      - CHAT_ENDPOINT_URL=/api/chat/stream
      - PUBLIC_DEEPLINK_BASE=${PUBLIC_DEEPLINK_BASE}
    expose:
      - "3000"

  backend:
    build:
      context: ../apps/backend
    restart: unless-stopped
    environment:
      # AI providers (OpenAI-compatible)
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - EMBED_BASE_URL=${EMBED_BASE_URL}
      - EMBED_API_KEY=${EMBED_API_KEY}
      - EMBED_MODEL=${EMBED_MODEL}
      - EMBED_DIM=${EMBED_DIM:-768}
      - LLM_TIMEOUT_SECONDS=${LLM_TIMEOUT_SECONDS:-5}
      
      # Database
      - SQLITE_PATH=/var/jellirag/jellyrag.db
      
      # Sync service
      - SYNC_EMBED_CONCURRENCY=${SYNC_EMBED_CONCURRENCY:-4}
      
      # Homelab overlay (Tailscale-only)
      - JELLYFIN_TAILSCALE_URL=${JELLYFIN_TAILSCALE_URL}
      - JELLYFIN_API_KEY=${JELLYFIN_API_KEY}
      - JELLYFIN_DEEPLINK_BASE=${JELLYFIN_DEEPLINK_BASE}
      
      # Conversation lifecycle
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      
      # Auth perimeter
      - JWT_SECRET=${JWT_SECRET}
      - JWT_TTL_DAYS=${JWT_TTL_DAYS:-7}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD}
      
      # CORS (should match tailscale serve URL)
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
      
      # Sync schedule (cron)
      - SYNC_CRON=${SYNC_CRON:-0 3 * * *}
    expose:
      - "8000"
    volumes:
      # Bind mount for persistent SQLite database
      - ${SQLITE_VOLUME_PATH:-/var/jellirag}:/var/jellirag